<svg width="1200" height="500" viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="apTeal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e3d3a"/>
      <stop offset="100%" stop-color="#03100f"/>
    </linearGradient>
    <linearGradient id="apPanel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5fbfb"/>
      <stop offset="100%" stop-color="#e3eef0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="500" fill="url(#apTeal)"/>
  <g stroke="#39d6c4" stroke-opacity="0.18" stroke-width="1">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <path d="M0 500 C 300 350, 500 450, 1200 250" fill="none"/>
    <path d="M0 420 C 350 280, 600 380, 1200 150" fill="none"/>
  </g>

  <text x="60" y="190" font-family="Arial, Helvetica, sans-serif" font-size="64" font-weight="800" fill="#3fe0cf">Airplate AI</text>
  <text x="60" y="250" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#eafffb">Event &amp; banqueting</text>
  <text x="60" y="290" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#eafffb">contract automation</text>
  <text x="60" y="330" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#eafffb">for hotels</text>

  <!-- right dashboard panel -->
  <g transform="translate(620,30)">
    <rect x="0" y="0" width="540" height="440" rx="12" fill="url(#apPanel)"/>
    <text x="30" y="50" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="800" fill="#0f2b2b">Event &amp; Banqueting</text>
    <text x="30" y="84" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="800" fill="#0f2b2b">Contract Automation For</text>
    <text x="30" y="128" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="800" fill="#19c4b5">Hotels</text>

    <circle cx="460" cy="60" r="22" fill="#9bb8c9"/>
    <circle cx="500" cy="130" r="22" fill="#e3b870"/>
    <rect x="430" y="160" width="90" height="28" rx="14" fill="#19c4b5"/>
    <text x="445" y="179" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#ffffff">Waiting List</text>

    <!-- dashboard card -->
    <rect x="30" y="220" width="480" height="190" rx="10" fill="#ffffff" stroke="#dbe7ea" stroke-width="2"/>
    <rect x="30" y="220" width="120" height="190" rx="10" fill="#0f2b2b"/>
    <text x="50" y="250" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#ffffff">AirPlate</text>
    <text x="50" y="285" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#9fe6dc">Overview</text>
    <text x="50" y="315" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6b8e8a">RFP</text>
    <text x="50" y="345" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6b8e8a">KPI</text>
    <text x="50" y="375" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6b8e8a">Settings</text>

    <text x="180" y="250" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#0f2b2b">Overview</text>
    <text x="180" y="290" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="800" fill="#0f2b2b">152,120 €</text>
    <text x="180" y="310" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#7a8b8b">Monthly Sales</text>
    <text x="340" y="290" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="800" fill="#0f2b2b">24,800 €</text>
    <text x="340" y="310" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#7a8b8b">Current quote to sell</text>

    <g font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="800" fill="#0f2b2b">
      <text x="180" y="370">63</text>
      <text x="240" y="370">30</text>
      <text x="300" y="370">18</text>
      <text x="360" y="370">12</text>
      <text x="420" y="370">03</text>
    </g>
    <g font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#7a8b8b">
      <text x="180" y="390">All offers</text>
      <text x="240" y="390">Signed</text>
      <text x="300" y="390">Accepted</text>
      <text x="360" y="390">Pending</text>
      <text x="420" y="390">Lost</text>
    </g>
  </g>
</svg>
