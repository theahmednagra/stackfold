<svg width="1200" height="500" viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="icBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f3fbf2"/>
      <stop offset="100%" stop-color="#dff3df"/>
    </linearGradient>
    <linearGradient id="icPanel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#19c25e"/>
      <stop offset="100%" stop-color="#0c8a40"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="500" fill="url(#icBg)"/>

  <!-- left: app window -->
  <g transform="translate(70,70)">
    <rect x="0" y="0" width="540" height="360" rx="16" fill="#ffffff" stroke="#d8ece0" stroke-width="2"/>
    <circle cx="28" cy="28" r="6" fill="#f5a3a3"/>
    <circle cx="50" cy="28" r="6" fill="#f6d28a"/>
    <circle cx="72" cy="28" r="6" fill="#9fe3ad"/>
    <rect x="40" y="70" width="460" height="22" rx="6" fill="#eef6ee"/>
    <rect x="40" y="120" width="460" height="160" rx="10" fill="#f4faf4" stroke="#dff0df" stroke-width="2"/>
    <g transform="translate(255,160)">
      <rect x="-30" y="10" width="60" height="50" rx="6" fill="#bfe6c6"/>
      <path d="M0 60 L0 0 M-18 18 L0 0 L18 18" stroke="#0c8a40" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <rect x="220" y="300" width="100" height="32" rx="16" fill="#19c25e"/>
  </g>

  <!-- right: green panel -->
  <g transform="translate(630,0)">
    <rect x="0" y="0" width="570" height="500" fill="url(#icPanel)"/>
    <text x="60" y="190" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="800" fill="#ffffff">Image Converter</text>
    <text x="60" y="240" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#e7fbe9">Solve your daily life challenges in</text>
    <text x="60" y="270" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#e7fbe9">converting high quality images</text>
    <text x="60" y="300" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#e7fbe9">with instant click</text>
    <g stroke="#ffffff" stroke-opacity="0.15" stroke-width="1">
      <circle cx="470" cy="80" r="60" fill="none"/>
      <circle cx="500" cy="420" r="90" fill="none"/>
    </g>
  </g>
